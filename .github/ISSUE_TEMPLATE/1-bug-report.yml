name: 🐞 Fehler melden
description: Melde einen Fehler in der Anwendung.
title: "[Fehler] "
labels: ["Type: Bug"]
body:
  - type: markdown
    attributes:
      value: |
        Danke für das Melden eines Fehlers! Bitte prüfe vorab offene/geschlossene Issues.
        Bitte beachte unsere [Verhaltensregeln](../CODE_OF_CONDUCT.md).
  - type: input
    id: summary
    attributes:
      label: Kurzbeschreibung
      description: Kurze, prägnante Beschreibung des Fehlers
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Tatsächliches Verhalten
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Schritte zur Reproduktion
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Betroffene Umgebung
      options:
        - Entwicklung
        - Test
        - Produktion
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & Version (optional)
  - type: input
    id: last-known-good
    attributes:
      label: Letzte bekannte funktionierende Version/Commit (optional)
  - type: textarea
    id: logs
    attributes:
      label: Relevante Logauszüge (optional)
      render: shell
  - type: textarea
    id: attachments
    attributes:
      label: Screenshots / Anhänge (optional)
  - type: dropdown
    id: priority
    attributes:
      label: Priorität
      options:
        - Niedrig
        - Mittel
        - Hoch
        - Kritisch
  - type: checkboxes
    id: check-duplicate
    attributes:
      label: Kein Duplikat
      description: Ich habe nach Duplikaten gesucht.
      options:
        - label: Ich bestätige, dass dieses Issue kein Duplikat ist
          required: true
