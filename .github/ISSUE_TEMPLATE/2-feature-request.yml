name: ✨ Funktionswunsch
description: Schlage eine neue Funktion oder Verbesserung vor.
title: "[Feature] "
labels: ["Type: Feature"]
body:
  - type: markdown
    attributes:
      value: |
        Danke für deinen Vorschlag! Bitte prüfe vorab offene/geschlossene Issues.
        Bitte beachte unsere [Verhaltensregeln](../CODE_OF_CONDUCT.md).
  - type: input
    id: summary
    attributes:
      label: Kurzbeschreibung
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem/Nutzen
      description: Beschreibe das Problem oder den erwarteten Mehrwert.
      placeholder: |
        Als [Rolle] möchte ich [Ziel], um [Nutzen].
  - type: textarea
    id: user-story
    attributes:
      label: User Story
      placeholder: |
        Als [Rolle] möchte ich [Ziel], um [Nutzen].
  - type: textarea
    id: acceptance
    attributes:
      label: Akzeptanzkriterien
      description: Stichpunkte mit überprüfbaren Kriterien.
  - type: textarea
    id: non-functional
    attributes:
      label: Nicht‑funktionale Anforderungen
      description: Performance, Sicherheit, Barrierefreiheit, etc.
  - type: textarea
    id: impact
    attributes:
      label: Auswirkungen auf bestehende Funktionen (optional)
  - type: textarea
    id: attachments
    attributes:
      label: Mockups / Anhänge / Referenzen (optional)
  - type: dropdown
    id: priority
    attributes:
      label: Priorität
      options:
        - Niedrig
        - Mittel
        - Hoch
        - Kritisch
  - type: checkboxes
    id: check-duplicate
    attributes:
      label: Kein Duplikat
      description: Ich habe nach Duplikaten gesucht.
      options:
        - label: Ich bestätige, dass dieses Issue kein Duplikat ist
          required: true
