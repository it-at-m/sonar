name: ⚙ Wartung / Technische Schulden
description: Schlage Wartungsarbeiten oder technische Verbesserungen vor.
title: "[Wartung] "
labels: ["Type: Maintenance"]
body:
  - type: markdown
    attributes:
      value: |
        Danke für deinen Vorschlag! Bitte prüfe vorab offene/geschlossene Issues.
        Bitte beachte unsere [Verhaltensregeln](../CODE_OF_CONDUCT.md).
  - type: input
    id: summary
    attributes:
      label: Kurzbeschreibung
    validations:
      required: true
  - type: dropdown
    id: maintenance-type
    attributes:
      label: Wartungstyp
      options:
        - Abhängigkeiten
        - Refactoring
        - Build‑Tooling
        - CI/CD
        - Sicherheit
        - Datenbankmigration
        - Dokumentationstechnik
        - Anderes
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Betroffener Bereich
      multiple: true
      options:
        - backend
        - frontend
        - dokumentation
        - stack
        - ci
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Nutzen
      description: Warum sollte das umgesetzt werden? (Stabilität, Sicherheit, Wartbarkeit …)
  - type: checkboxes
    id: check-duplicate
    attributes:
      label: Kein Duplikat
      description: Ich habe nach Duplikaten gesucht.
      options:
        - label: Ich bestätige, dass dieses Issue kein Duplikat ist
          required: true
