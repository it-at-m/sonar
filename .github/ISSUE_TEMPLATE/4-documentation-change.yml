name: 📄 Dokumentationsänderung
description: Schlage Änderungen an der Dokumentation vor.
title: "[Dokumentation] "
labels: ["Type: Documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Danke für deinen Vorschlag! Bitte prüfe vorab offene/geschlossene Issues.
        Bitte beachte unsere [Verhaltensregeln](../CODE_OF_CONDUCT.md).
  - type: dropdown
    id: doc-area
    attributes:
      label: Bereich der Dokumentation
      multiple: true
      options:
        - repo readme/md
        - docs site (vitepress)
        - entwicklerdoku
        - architektur
        - api (openapi)
        - changelog
        - sonstiges
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Betroffener Bereich (Code)
      multiple: true
      options:
        - backend
        - frontend
        - dokumentation
        - stack
        - ci
  - type: textarea
    id: current
    attributes:
      label: Aktueller Stand
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Gewünschte Änderung
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Akzeptanzkriterien (optional)
  - type: textarea
    id: context
    attributes:
      label: Kontext / Referenzen / Anhänge (optional)
  - type: checkboxes
    id: check-duplicate
    attributes:
      label: Kein Duplikat
      description: Ich habe nach Duplikaten gesucht.
      options:
        - label: Ich bestätige, dass dieses Issue kein Duplikat ist
          required: true
